  yaml: '>=2.8.3 <3'
  zod: ^4.3.6
peerDependencyRules:
  ignoreMissing:
    - '@opentelemetry/core'
    - '@opentelemetry/resources'
    - '@opentelemetry/sdk-metrics'
    - '@opentelemetry/sdk-trace-base'
  allowedVersions:
    zod: '*'
allowBuilds:
  # Prebuilt binaries ship with the package; the build script is only a fallback.
  '@parcel/watcher': false
  '@scarf/scarf@1.4.0': false
  '@tsparticles/engine@3.9.1': false
  'es5-ext@0.10.64': false
  'esbuild@0.25.4 || 0.25.12': true
  'keytar@7.9.0': true
  'node-pty@1.0.0 || 1.2.0-beta.12': true
  'protobufjs@7.5.8 || 7.6.5': false
  'sharp@0.34.5': true
  'sqlite3@5.1.7': true
  'tree-sitter-bash@0.25.0': true
patchedDependencies:
  streamdown@2.5.0: patches/streamdown@2.5.0.patch
